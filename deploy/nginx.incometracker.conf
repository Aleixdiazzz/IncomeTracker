# nginx reverse-proxy site for incometracker.
# Use if the VPS already runs nginx on the host.
#
#   1. Edit server_name and the APP_PORT in proxy_pass to match .env.production.
#   2. sudo cp deploy/nginx.incometracker.conf /etc/nginx/sites-available/incometracker
#   3. sudo ln -s /etc/nginx/sites-available/incometracker /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. sudo certbot --nginx -d YOUR.DOMAIN     # provisions + auto-renews TLS,
#                                              # and rewrites this file for 443.
#
# After certbot runs it injects the listen 443 ssl + cert lines and a port-80
# -> 443 redirect automatically, so you usually only edit the http block below.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR.DOMAIN;   # <-- change me

    # Next.js standalone app, bound to localhost only by docker-compose.prod.yml.
    location / {
        proxy_pass http://127.0.0.1:3000;   # <-- match APP_PORT in .env.production

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Critical for Better Auth secure cookies / correct callback URLs:
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    client_max_body_size 5m;
}
